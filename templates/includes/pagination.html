{% if is_paginated %}
  <div class="d-flex justify-content-center mt-5 mb-4">
    <nav aria-label="Page navigation">
      <ul class="pagination pagination-primary m-0">

        {% if page_obj.has_previous %}
          <li class="page-item">
            <a class="page-link" href="?{{ request.GET.urlencode }}&page={{ page_obj.previous_page_number }}" aria-label="Previous">
              <span aria-hidden="true"><i class="fa fa-angle-left" aria-hidden="true"></i></span>
            </a>
          </li>
        {% else %}
          <li class="page-item disabled">
            <span class="page-link"><i class="fa fa-angle-left" aria-hidden="true"></i></span>
          </li>
        {% endif %}

        <li class="page-item active">
          <span class="page-link text-white">
            {{ page_obj.number }}
          </span>
        </li>

        <li class="page-item disabled">
          <span class="page-link bg-transparent text-secondary border-0">
            of {{ page_obj.paginator.num_pages }}
          </span>
        </li>

        {% if page_obj.has_next %}
          <li class="page-item">
            <a class="page-link" href="?{{ request.GET.urlencode }}&page={{ page_obj.next_page_number }}" aria-label="Next">
              <span aria-hidden="true"><i class="fa fa-angle-right" aria-hidden="true"></i></span>
            </a>
          </li>
        {% else %}
          <li class="page-item disabled">
            <span class="page-link"><i class="fa fa-angle-right" aria-hidden="true"></i></span>
          </li>
        {% endif %}

      </ul>
    </nav>
  </div>
{% endif %}
