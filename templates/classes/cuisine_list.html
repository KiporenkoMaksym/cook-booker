{% extends "base.html" %}

{% block content %}
  <h1>List of world cuisines</h1>
  {% if cuisine_list %}
    <ul>
      {% for cuisine in cuisine_list %}
        <li><a href="{% url 'classes:cuisine-detail' pk=cuisine.id %}">{{ cuisine.name }}</a></li>
      {% endfor %}
    </ul>
  {% else %}
    <p>There are no cuisines in the database.</p>
  {% endif %}
{% endblock %}
