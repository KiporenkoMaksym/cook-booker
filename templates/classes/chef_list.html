{% extends "base.html" %}

{% block content %}
  <h1>
    Chef List
    <a href="{% url 'classes:chef-create' %}" class="btn btn-primary link-to-page">Create</a>
  </h1>
  {% if chef_list %}
    <ul>
      {% for chef in chef_list %}
        <li>
          <a href="{% url 'classes:chef-detail' pk=chef.id %}">{{ chef.id }}</a>
          {{ chef.first_name }} {{ chef.last_name }}
        </li>
      {% endfor %}
    </ul>
    {% else %}
      <p>There are no chefs in courses</p>
  {% endif %}
{% endblock %}
