{% extends "layouts/base_sections.html" %}
{% load crispy_forms_filters %}
{% load static %}

{% block content %}
  <h1 class="pt-8 pb-8 ps-3"
      style="background-image: url('{% static 'img/curved-images/ingredient_form.jpg' %}');
        background-repeat: no-repeat;
        background-size: cover;
        ">{{ object|yesno:"Update, Create" }} ingredient</h1>
  <form class="ms-3 me-3" action="" method="post" novalidate>
    {% csrf_token %}
    {{ form|crispy }}
    <input type="submit" value="Submit" class="btn btn-success">
  </form>
{% endblock %}
